apiVersion: v1
kind: Service
metadata:
  name: task-service-svc
spec:
  selector:
    app: task-service
  type: NodePort
  ports:
    - port: {{ .Values.taskService.port }}
      targetPort: {{ .Values.taskService.port }}
      nodePort: {{ .Values.taskService.nodePort }}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service-svc
spec:
  selector:
    app: notification-service
  type: NodePort
  ports:
    - port: {{ .Values.notificationService.port }}
      targetPort: {{ .Values.notificationService.port }}
      nodePort: {{ .Values.notificationService.nodePort }}
